<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — CelestiaAura</title>
  <link rel="icon" type="image/png" href="../assets/images/favicons/favicon.png">
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/dark-mode.css">
  <link rel="stylesheet" href="../assets/css/rtl.css">
  <link rel="stylesheet" href="../assets/css/dashboard.css">
  <link rel="stylesheet" href="../assets/css/responsive.css">
</head>
<body>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <a href="../home-1.html" class="sidebar__logo">
        <div class="sidebar__logo-icon"><i class="fas fa-star-of-david"></i></div>
        <span class="sidebar__logo-text">CelestiaAura</span>
      </a>
    </div>
    <nav class="sidebar__nav">
      <div class="sidebar__section-label">My Space</div>
      <a href="index.html" class="sidebar__link"><i class="fas fa-home"></i> My Dashboard</a>
      <a href="my-bookings.html" class="sidebar__link"><i class="fas fa-calendar-alt"></i> My Bookings</a>
      <a href="my-readings.html" class="sidebar__link"><i class="fas fa-hand-sparkles"></i> My Readings</a>
      <a href="horoscope.html" class="sidebar__link"><i class="fas fa-sun"></i> Daily Horoscope</a>

      <div class="sidebar__section-label">Explore</div>
      <a href="../services.html" class="sidebar__link"><i class="fas fa-spa"></i> Browse Services</a>
      <a href="favorites.html" class="sidebar__link"><i class="fas fa-heart"></i> Favorites</a>
      <a href="birth-chart.html" class="sidebar__link"><i class="fas fa-chart-pie"></i> My Birth Chart</a>

      <div class="sidebar__section-label">Account</div>
      <a href="my-profile.html" class="sidebar__link active"><i class="fas fa-user"></i> My Profile</a>
      <a href="my-subscription.html" class="sidebar__link"><i class="fas fa-crown"></i> Subscription</a>
    </nav>
    <div class="sidebar__footer">
      <div style="font-size: 10px; color: var(--clr-text-muted); text-align: center;">CelestiaAura User v1.2</div>
    </div>
  </aside>

  <div class="dash-main">
    <header class="dash-header">
      <div class="dash-header__left">
        <button class="dash-header__hamburger" aria-label="Toggle sidebar"><span class="navbar__hamburger-bar"></span><span class="navbar__hamburger-bar"></span><span class="navbar__hamburger-bar"></span></button>
        <div>
          <div class="dash-header__title">My Profile</div>
          <div class="dash-header__subtitle">Manage your personal celestial profile</div>
        </div>
      </div>
      <div class="dash-header__right">
        <button class="dash-header__icon-btn theme-toggle" aria-label="Toggle theme"><i class="fas fa-moon"></i></button>
        <div class="dash-header__user">
          <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop&crop=face" alt="User Avatar" class="dash-header__user-avatar">
          <div class="dash-header__user-info">
            <div class="dash-header__user-name">Arya Nightbloom</div>
            <div class="dash-header__user-role">Mystic Plan</div>
          </div>
          <i class="fas fa-chevron-down dash-header__user-chevron"></i>
        </div>
      </div>
    </header>

    <div class="dash-content">
      <div class="dash-panel">
        <div class="dash-panel__header"><h2 class="dash-panel__title"><i class="fas fa-id-card" style="color:var(--clr-accent);"></i> Personal Details</h2></div>
        <div class="dash-panel__body">
          <div style="display:flex;gap:var(--sp-8);flex-wrap:wrap;align-items:start;">
            <div style="text-align:center;">
              <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop&crop=face" alt="Avatar" style="width:120px;height:120px;border-radius:50%;border:4px solid var(--clr-accent);margin-bottom:var(--sp-4);">
              <button class="btn btn--ghost btn--sm"><i class="fas fa-camera"></i> Change Photo</button>
            </div>
            <form style="flex:1;min-width:300px;">
              <div class="grid grid--2" style="gap:var(--sp-4);">
                <div class="form-group"><label class="form-label">Full Name</label><input type="text" class="form-input" value="Arya Nightbloom"></div>
                <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-input" value="arya@email.com"></div>
                <div class="form-group"><label class="form-label">Birth Date</label><input type="date" class="form-input" value="1995-03-12"></div>
                <div class="form-group"><label class="form-label">Birth Time</label><input type="time" class="form-input" value="04:22"></div>
              </div>
              <button class="btn btn--primary" style="margin-top:var(--sp-6);">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/theme.js"></script>
  <script src="../assets/js/rtl.js"></script>
  <script src="../assets/js/dashboard.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
